version: '3.8'

services:
  streamlit:
    build: .
    container_name: sncf-analytics
    ports:
      - "8501:8501"
    volumes:
      # Mount the DuckDB database
      - ../ferrodata.duckdb:/app/ferrodata.duckdb:ro
      # Mount app code for hot reload in development
      - ./app.py:/app/app.py
      - ./pages:/app/pages
      - ./utils:/app/utils
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
