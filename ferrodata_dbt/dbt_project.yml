name: ferrodata_dbt

profile: ferrodata_dbt

seed-paths: ["seeds"]
model-paths: ["models"]
macro-paths: ["macros"]
clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  # Builds seeds into '<your_schema_name>_raw'
  ferrodata_dbt:
    +schema: raw

models:
  ferrodata_dbt:
    +static_analysis: strict
    # Materialize staging models as views, and marts as tables
    staging:
      +schema: staging
      +materialized: table
    marts:
      +schema: analytics
      +materialized: table
